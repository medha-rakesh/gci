function getLang(fname) {
  // Standard: 1.1, 1.2, 1.3, 1.4
  const m = fname.match(/^(1\.[1-4])/);
  if (m) return LANG_MAP[m[1]] || null;
  // Sub-variants: 1.1.1, 1.1.2 → Java; 1.2.x → Python etc.

  if (m3) return LANG_MAP[m3[1] + "."] || null;
  return null;
}

// Folder name in repo for section (handle Fast _ Slow pointers special case)
function repoFolder(secName) {
  if (secName === "4. Pattern Fast & Slow Pointers") return "4. Pattern Fast _ Slow pointers";
  if (secName === "14. Pattern Top _K_ Elements") return "14. Pattern Top _K_ Elements";
  if (secName === "16. Pattern 0 or 1 Knapsack (Dynamic Programming)") return "16. Pattern  0 or 1 Knapsack (Dynamic Programming)";
  return secName;
}

// Build flat page list
const allPages = [];
COURSE.forEach(sec => {
  sec.t.forEach(sub => {
    sub.f.forEach(fname => {
      const folder = repoFolder(sec.s);
      let subPath = sub.p;
      if (sub.p === "2. 0/1 Knapsack (medium)") subPath = "2. 01 Knapsack (medium)";
      if (sub.p === "9. Solution Review_ Problem Challenge 2" && sec.s === "16. Pattern 0 or 1 Knapsack (Dynamic Programming)") subPath = "9. Solution Review_ Problem Challenge 2";
      const path = subPath
        ? `${folder}/${subPath}/${fname}`
        : `${folder}/${fname}`;
      allPages.push({
        path, fname, sec: sec.s, sub: sub.p,
        url: BASE + path.split('/').map(encodeURIComponent).join('/')
      });
    });
  });
});

let activeIdx = -1;
let activeLangPref = null; // null = default first file of problem

function cleanTitle(fname) {
  return fname.replace(/\.html$/i,'')
    .replace(/^[\d.]+\s*/,'')
    .replace(/ - Grokking.*$/i,'')
    .replace(/ -\s*$/,'')
    .trim() || fname;
}

function renderNav(q) {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  q = (q||'').toLowerCase();

  COURSE.forEach(sec => {
    // Gather matching problem groups
    const matchingSubs = sec.t.filter(sub =>
      !q ||
      sec.s.toLowerCase().includes(q) ||
      sub.p.toLowerCase().includes(q) ||
      sub.f.some(f => cleanTitle(f).toLowerCase().includes(q))
    );
    if (!matchingSubs.length) return;

    const secEl = document.createElement('div');
    secEl.className = 'sec';

    const hdr = document.createElement('div');
    hdr.className = 'sec-hdr' + (activeIdx >= 0 && allPages[activeIdx].sec === sec.s ? ' open' : (q ? ' open' : ''));
    hdr.innerHTML = `<span class="arr">▶</span><span>${sec.s.replace(/^\d+\.\s*/,'')}</span>`;
    hdr.onclick = () => hdr.classList.toggle('open');
    secEl.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'sec-body';

    matchingSubs.forEach(sub => {
      // Group files by problem (all files with same prefix = same problem)
      // Show one row per problem group, with lang tabs inline
      // Find the "first" file (Java = 1.1) as the default
      const subHdr = document.createElement('div');
      subHdr.className = 'sub-hdr';
      subHdr.textContent = sub.p || sec.s.replace(/^\d+\.\s*/,'');
      body.appendChild(subHdr);

      // Group by prefix (1.1, 1.2, etc are same problem, show as one entry)
      // Since each sub already IS a problem, show lang switcher inline
      const pgEl = document.createElement('div');
      pgEl.className = 'pg';

      // Find matching page indices
      const pageIdxs = allPages.map((p,i) => p.sec===sec.s && p.sub===sub.p ? i : -1).filter(i=>i>=0);
      if (!pageIdxs.length) return;

      const firstIdx = pageIdxs[0];
      if (pageIdxs.includes(activeIdx)) pgEl.classList.add('active');

      const title = document.createElement('span');
      title.style.flex = '1';
      title.style.fontSize = '12px';
      title.textContent = sub.p ? sub.p.replace(/^\d+\.\s*/,'') : cleanTitle(sub.f[0]);
      pgEl.appendChild(title);

      // Lang badges
      pageIdxs.forEach(pi => {
        const lang = getLang(allPages[pi].fname);
        if (!lang) return;
        const badge = document.createElement('span');
        badge.className = 'lang ' + lang.cls;
        badge.textContent = lang.label;
        badge.style.cssText = 'font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;cursor:pointer;flex-shrink:0';
        badge.onclick = (e) => { e.stopPropagation(); loadPage(pi); };
        pgEl.appendChild(badge);
      });

      pgEl.onclick = () => loadPage(firstIdx);
      body.appendChild(pgEl);
    });

    secEl.appendChild(body);
    nav.appendChild(secEl);
  });
}

function buildLangTabs(pageIdx) {
  const pg = allPages[pageIdx];
  const tabs = document.getElementById('lang-tabs');
  tabs.innerHTML = '';

  const siblings = allPages.map((p,i) => (p.sec===pg.sec && p.sub===pg.sub) ? i : -1).filter(i=>i>=0);
  if (siblings.length <= 1) return;

  // Group siblings by language — if multiple files share a lang, first one wins for the tab target
  const seen = new Map(); // lang label -> first page idx
  siblings.forEach(si => {
    const lang = getLang(allPages[si].fname);
    const key = lang ? lang.label : allPages[si].fname.slice(0,6);
    if (!seen.has(key)) seen.set(key, {si, lang});
  });

  seen.forEach(({si, lang}, key) => {
    const tab = document.createElement('button');
    tab.className = 'ltab' + (si===pageIdx || (lang && getLang(allPages[pageIdx].fname) && getLang(allPages[pageIdx].fname).label===key) ? ' active' : '');
    tab.textContent = key;
    tab.onclick = () => loadPage(si);
    tabs.appendChild(tab);
  });
}

function loadPage(idx) {
  if (idx < 0 || idx >= allPages.length) return;
  activeIdx = idx;
  const pg = allPages[idx];

  document.getElementById('pg-title').textContent =
    pg.sub ? pg.sub.replace(/^\d+\.\s*/,'') : cleanTitle(pg.fname);
  document.getElementById('pg-sub').textContent = pg.sec;
  document.getElementById('prog').textContent = (idx+1) + ' / ' + allPages.length;
  document.getElementById('prev').disabled = idx <= 0;
  document.getElementById('next').disabled = idx >= allPages.length - 1;
  document.getElementById('prev').onclick = () => loadPage(idx-1);
  document.getElementById('next').onclick = () => loadPage(idx+1);

  const extBtn = document.getElementById('ext-btn');
  extBtn.classList.remove('hidden');
  extBtn.onclick = () => window.open(pg.url, '_blank');

  document.getElementById('ph').classList.add('hidden');
  const frame = document.getElementById('frame');
  const loading = document.getElementById('loading');
  frame.classList.add('hidden');
  loading.classList.remove('hidden');

  fetch(pg.url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => {
      loading.classList.add('hidden');
      frame.classList.remove('hidden');
      frame.srcdoc = html;
    })
    .catch(err => {
      loading.classList.add('hidden');
      frame.classList.remove('hidden');
      frame.srcdoc = `<body style="font-family:sans-serif;padding:2rem;color:#555"><h2>Could not load file</h2><p style="margin-top:1rem">Error: ${err.message}</p><p style="margin-top:0.5rem"><a href="${pg.url}" target="_blank">Open directly in new tab ↗</a></p></body>`;
    });

  buildLangTabs(idx);
  renderNav(document.getElementById('search').value);

  setTimeout(() => {
    const active = document.querySelector('.pg.active');
    if (active) active.scrollIntoView({block:'nearest'});
  }, 30);
}

document.getElementById('search').addEventListener('input', e => renderNav(e.target.value));
renderNav('');
